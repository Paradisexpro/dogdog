<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<!-- 📱 สำคัญมากสำหรับมือถือ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>หมาน้อยอาตอม</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  text-align: center;
  margin: 0;
  padding: 10px;
}

/* 📦 กล่องหลัก */
.box {
  width: 95%;
  max-width: 420px;
  margin: 10px auto;
  padding: 15px;
  background: #222;
  border-radius: 15px;
  box-sizing: border-box;
}

/* 🐶 ตัวสัตว์ */
#pet {
  font-size: 100px;
  margin: 10px 0;
}

/* 🔘 ปุ่มมือถือ */
button {
  width: 45%;
  padding: 14px;
  margin: 5px 2%;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* ⌨️ input */
input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  font-size: 16px;
  margin-bottom: 8px;
  border: none;
}

/* 📊 แถบสถานะ */
.bar {
  height: 14px;
  background: #444;
  border-radius: 10px;
  overflow: hidden;
  margin: 6px 0 12px;
}

.fill {
  height: 100%;
  background: limegreen;
  width: 50%;
  transition: 0.3s;
}
</style>
</head>

<body>

<h2>🐾 หมาน้อยอาตอม</h2>

<div class="box">

  <div id="pet">🐶</div>

  <p>😊 ความสุข</p>
  <div class="bar"><div id="happyBar" class="fill"></div></div>

  <p>🍗 ความหิว</p>
  <div class="bar"><div id="hungerBar" class="fill"></div></div>

  <button onclick="feed()">ให้อาหาร</button>
  <button onclick="play()">เล่น</button>

  <hr>

  <input id="msg" placeholder="พูดกับสัตว์เลี้ยง...">
  <button onclick="talk()">ส่ง</button>

  <p id="reply"></p>

</div>

<script>

let hunger = 50;
let happy = 50;

// 🔧 อัปเดต UI
function update(){
  document.getElementById("hungerBar").style.width = hunger + "%";
  document.getElementById("happyBar").style.width = happy + "%";

  let pet = document.getElementById("pet");

  if(hunger > 80) pet.innerText = "😡";
  else if(happy > 80) pet.innerText = "😄";
  else if(hunger < 30) pet.innerText = "😋";
  else if(happy < 30) pet.innerText = "😢";
  else pet.innerText = "🐶";
}

// 🍗 ให้อาหาร
function feed(){
  hunger -= 25;
  happy += 5;
  clamp();
  update();
}

// 🎾 เล่น
function play(){
  happy += 25;
  hunger += 10;
  clamp();
  update();
}

// 🔒 จำกัดค่า
function clamp(){
  hunger = Math.max(0, Math.min(100, hunger));
  happy = Math.max(0, Math.min(100, happy));
}

// 💬 ระบบพูดคุย (ฉลาด + สุ่ม)
function talk(){

  let msg = document.getElementById("msg").value.toLowerCase();
  let reply = "";

  function random(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  if (msg.includes("รัก") || msg.includes("ชอบ")) {
    reply = random([
      "🐶 รักเหมือนกันเลย!",
      "💖 ดีใจจัง!",
      "🐾 เราก็รักเธอนะ!",
      "😊 อบอุ่นใจมาก!"
    ]);
  }

  else if (msg.includes("หิว") || msg.includes("กิน")) {
    reply = random([
      "🍗 ขอไก่หน่อย!",
      "🐶 หิวมากเลย!",
      "🥺 ขออาหารหน่อย!",
      "🍖 อยากกินแล้ว!"
    ]);
  }

  else if (msg.includes("เล่น") || msg.includes("วิ่ง")) {
    reply = random([
      "🎾 ไปเล่นกัน!",
      "🐶 สนุกมาก!",
      "😄 วิ่งๆ!",
      "🏃‍♂️ มาเร็ว!"
    ]);
  }

  else if (msg.includes("ชื่อ")) {
    reply = random([
      "🐶 เราชื่อหมาอาตอม!",
      "🐾 เรียกเราว่าอาตอม!",
      "😎 Atom Dog!"
    ]);
  }

  else if (msg.includes("เหงา")) {
    reply = random([
      "🥺 มาอยู่ด้วยกันสิ",
      "🐶 อย่าทิ้งเรา",
      "💔 เราเหงา..."
    ]);
  }

  else if (msg.includes("ง่วง") || msg.includes("นอน")) {
    reply = random([
      "😴 ฝันดีนะ",
      "💤 ขอไปนอนก่อน",
      "🐶 ง่วงแล้ว..."
    ]);
  }

  else if (msg.includes("โกรธ")) {
    reply = random([
      "😡 งอนแล้วนะ",
      "🐶 ไม่คุยแล้ว!",
      "😤 ฮึ่ม!"
    ]);
  }
else if (msg.includes("555ไมตลก") || msg.includes("กิน")) {
    let r = [
      "🍗 ไอหมาตอม!",
      "🐶 ไอเตี้ย!",
      "🥺 มีไรอยากบอกนะ!",
      "🍖 เเต่ยังไม่บอกดีกว่า!"
    ];
    reply = r[Math.floor(Math.random() * r.length)];
  }

  else {
    reply = random([
      "🐶 ฟังอยู่นะ",
      "🤔 ไม่เข้าใจแต่โอเค",
      "🐾 เธอพูดอะไรนะ?",
      "😄 สนุกจัง!"
    ]);
  }

  happy += 5;
  hunger += 3;

  clamp();
  document.getElementById("reply").innerText = reply;
  update();
}

// ⏳ ลดค่าอัตโนมัติ
setInterval(()=>{
  hunger += 2;
  happy -= 1;
  clamp();
  update();
}, 3000);

update();

</script>

</body>
</html>
